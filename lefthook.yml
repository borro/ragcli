pre-commit:
  parallel: false
  commands:
    gofmt:
      glob: "*.go"
      run: gofmt -w {staged_files}
      stage_fixed: true
    golangci-lint:
      run: golangci-lint run --timeout=5m ./cmd/... ./internal/...
    go-test:
      run: go test ./...
pre-push:
  parallel: false
  commands:
    live-e2e-smoke:
      interactive: true
      run: ./scripts/e2e_live_smoke.sh
