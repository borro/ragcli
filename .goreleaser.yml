version: 2

project_name: ragcli

builds:
  - id: ragcli
    main: ./cmd/ragcli
    binary: ragcli
    ldflags:
      - -s -w -X main.version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: ragcli-windows
    main: ./cmd/ragcli
    binary: ragcli
    ldflags:
      - -X main.version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64

archives:
  - id: default
    builds:
      - ragcli
      - ragcli-windows
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  use: git
