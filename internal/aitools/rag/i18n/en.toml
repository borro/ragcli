[tools.description]
search_rag = "Search the pre-indexed attached file or directory corpus semantically. Supports optional path narrowing and pagination via limit/offset. Returns JSON with query, path, match_count, total_matches, has_more, next_offset, and matches containing path, start_line, end_line, score, and text, plus cached, duplicate, already_seen, novel_lines, progress_hint, suggested_next_offset."

[tools.rag.param]
path = "Relative path inside the attached directory corpus; omit it only when a single file is attached or for corpus-wide semantic search"
query = "Semantic search query for the indexed corpus"
limit = "Maximum results for the current semantic search page"
offset = "Offset for semantic search result pagination"
