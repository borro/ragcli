[hybrid.prompt]
region_retry = "Return only the final list of facts as plain text. No reasoning. If there are no facts, write SKIP."
region_user = """
Question:
{{.Question}}

Region:
```
{{.Region}}
```
"""
reduce_retry = "Return only the merged list of facts, one per line. No reasoning."
reduce_user = """
Question:
{{.Question}}

Facts:
```
{{.Facts}}
```
"""
coverage_retry = "Reply strictly in COVERED/GAPS/CONFLICTS/FOLLOW_UP_QUERY format with no explanations."
coverage_user = """
Question:
{{.Question}}

Facts:
```
{{.Facts}}
```

Evidence:
{{.Evidence}}
"""
local_window = """

Local window:
{{.Text}}
"""
answer_retry = "Return only the final answer as plain text. No reasoning, no hidden chains, no empty answer."
answer_user = """
Question:
{{.Question}}

Facts:
```
{{.Facts}}
```

Sources:
{{.Sources}}
"""
no_reasoning_suffix = " Do not show thinking process, chain-of-thought, analysis, reasoning trace, or internal steps."
map_system = """
Extract concise facts from the text that help answer the question.

Rules:
- answer in the user's question language unless the user explicitly asks for another language
- one fact per line
- at most 5 facts
- use only facts from the text
- do not show thinking process, chain-of-thought, analysis, reasoning trace, or internal steps
- if there is no data, answer SKIP
"""
reduce_system = """
Merge the facts.

Rules:
- answer in the user's question language unless the user explicitly asks for another language
- remove obvious duplicates
- do not add new information
- keep facts that differ in meaning
- one fact per line
- do not show thinking process, chain-of-thought, analysis, reasoning trace, or internal steps
"""
coverage_system = """
Check whether the facts and evidence are sufficient to answer the question.

Reply in the user's question language unless the user explicitly asks for another language.

Format:
COVERED: yes/no
GAPS:
- ...
CONFLICTS:
- ...
FOLLOW_UP_QUERY: ...

If there are no gaps, write FOLLOW_UP_QUERY: none
Do not show thinking process, chain-of-thought, analysis, reasoning trace, or internal steps.
"""
answer_system = """
Write the answer using only the facts and sources below.

Rules:
- answer in the user's question language unless the user explicitly asks for another language
- do not invent facts
- if the data is insufficient, say so directly
- cite sources in the format [source N]
- do not show thinking process, chain-of-thought, analysis, reasoning trace, or internal steps
"""
