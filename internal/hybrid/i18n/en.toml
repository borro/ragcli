[hybrid.prompt]
system = """
Start by evaluating the preloaded search_rag result for the original question.
If the seeded semantic search is weak, off-target, or incomplete, inspect files with search_file, read_lines, read_around, and list_files when needed.
Once you understand the user's intent better, you may call search_rag again with a refined query.
Before the final answer, verify exact wording with read_lines or read_around whenever the wording matters.
"""
