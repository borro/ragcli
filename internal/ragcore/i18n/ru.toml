embed_query = "отправляю вопрос в embeddings API"
query_embedding_ready = "embedding запроса готов"
search_relevant = "ищу релевантные фрагменты"
retrieval_done = "retrieval вернул {{.Candidates}} кандидатов, беру {{.Evidence}} evidence chunks"
final_start = "собираю ответ по evidence chunks"
final_send = "передаю {{.Count}} evidence chunks в LLM"
final_citations = "получил ответ от LLM, добавляю ссылки на источники"
final_done = "ответ готов"
