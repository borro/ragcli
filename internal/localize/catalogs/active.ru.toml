Недостаточно данных, чтобы честно ответить на вопрос по найденным фрагментам.

Sources:
- none
"""

[tools.description]
search_file = "Искать по файлу. Поддерживает mode=auto|literal|regex, pagination через limit/offset и context_lines для соседних строк. Возвращает JSON с query, requested_mode, mode, match_count, total_matches, has_more, next_offset, а также служебные поля cached, duplicate, already_seen, novel_lines, progress_hint, suggested_next_offset."
read_lines = "Прочитать диапазон строк из файла. Возвращает JSON с start_line, end_line, line_count, lines и служебные поля cached, duplicate, already_seen, novel_lines, progress_hint."
read_around = "Прочитать окно строк вокруг конкретной строки. Возвращает JSON с line, before, after, start_line, end_line, line_count, lines и служебные поля cached, duplicate, already_seen, novel_lines, progress_hint."

[tools.param]
